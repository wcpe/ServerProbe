# ServerProbe 服务器探针配置
# 修改后需重启服务器或重载配置方可生效。

# 指标采集周期(单位:tick;20 tick = 1 秒)。默认 100(约 5 秒)。
collect-period-ticks: 100

# 内存中近期历史保留份数(每采集周期一份)。默认 360(约覆盖最近 30 分钟)。
history-capacity: 360

# 启动摘要中展示的慢插件榜条数(Top-N)。默认 5。
startup-top-n: 5

# 实例名称:用于区分多个服务端实例。留空则自动生成稳定实例 ID(跨重启保持不变)。
server-name: ""

# 启动画像归档保留份数:每次启动落盘一份,超出后清理最旧的。默认 30。
history-retention: 30

# 是否输出 DEBUG 级调试日志。默认 false(关闭)。
debug: false
